# Astrath Deeprealm — map / region / fog config
# Coordinates use the map's own pixel space, top-left origin (0,0).
# Layer images live under public/atlas/assets/ and are referenced by URL.

maps:
  - id: astrath-deeprealm-overview
    name: Overview
    width: 200000
    height: 100000
    oceanColor: "#18313f"
    scale:
      unitsPerPixel: 0.05      # 1 px = 0.05 mi
      unitLabel: mi
    grid:
      kind: hex
      size: 5000
      color: "rgba(255,255,255,0.06)"
      enabled: false           # off by default; toggle in viewer
    layers: []

  - id: astrath-deeprealm-northern-reaches
    name: Northern Reaches
    width: 80000
    height: 60000
    oceanColor: "#1c2a35"
    layers: []

regions:
  - id: ravens-vale-region
    mapId: astrath-deeprealm-overview
    name: Raven's Vale
    entityId: ravens-vale
    color: "#7fb069"
    fillOpacity: 0.18
    visibility: player
    points:
      - [80000, 35000]
      - [120000, 32000]
      - [128000, 55000]
      - [95000, 62000]
      - [78000, 50000]

  - id: thornhold-domain
    mapId: astrath-deeprealm-overview
    name: Thornhold Domain
    entityId: thornhold
    color: "#f4c95d"
    fillOpacity: 0.14
    visibility: player
    points:
      - [40000, 60000]
      - [70000, 58000]
      - [72000, 80000]
      - [42000, 82000]

# Fog of war: everything is shrouded except the listed reveal polygons.
# Players (visibility: player) see the fog; DM build keeps fog data but you
# can switch it off in the viewer.
fog:
  - mapId: astrath-deeprealm-overview
    enabled: true
    color: "rgba(8, 12, 20, 0.55)"
    reveals:
      - [[40000, 30000], [140000, 30000], [140000, 85000], [40000, 85000]]

routes:
  - id: kings-road
    mapId: astrath-deeprealm-overview
    name: The King's Road
    mode: horse
    speed: 6
    color: "#f4c95d"
    weight: 3
    visibility: player
    waypoints:
      - thornhold
      - sunhaven
  - id: ravens-trail
    mapId: astrath-deeprealm-overview
    name: Raven's Trail
    mode: foot
    speed: 3
    color: "#7fb069"
    dashed: true
    visibility: player
    waypoints:
      - sunhaven
      - ravens-vale
      - the-old-keep
