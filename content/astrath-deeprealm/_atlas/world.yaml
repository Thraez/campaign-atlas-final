# Map settings patch — Overview

Paste under the matching map entry in `content/<world>/_atlas/world.yaml`.

```yaml
maps:
  - id: astrath-deeprealm-overview
    width: 200000
    height: 100000
    oceanColor: "#18313f"
    wrapX: false
    grid:
      kind: hex
      size: 5000
      color: "rgba(255,255,255,0.06)"
      enabled: false
```
