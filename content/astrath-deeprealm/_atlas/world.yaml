# Astrath Deeprealm — map / region / fog / route / calendar config.
#
# CANON: This file is YAML SOURCE OF TRUTH. The DM normally does NOT edit it
# by hand — visual edits in /atlas/edit generate a YAML patch which is pasted
# here and committed. Manual edits are allowed but must remain valid YAML.
#
# Parsed by scripts/build-atlas.ts via loadWorldConfig().
# Generated runtime files (public/atlas/atlas.json, search-index.json) are
# DERIVED from this file + entity markdown — never treat them as canon.
#
# IMPORTANT: This file must be PURE YAML. Do NOT paste markdown code fences
# (```yaml) from exported patch files into this file — only paste the YAML
# inside the fence. A build-time check will fail loudly if fences slip in.

schemaVersion: 1

maps:
  - id: astrath-deeprealm-overview
    name: Overview
    width: 200000
    height: 100000
    oceanColor: "#18313f"
    wrapX: false
    scale:
      unitsPerPixel: 0.05
      unitLabel: mi
    grid:
      kind: hex
      size: 5000
      color: "rgba(255,255,255,0.06)"
      enabled: false
    layers:
      - id: overview-map
        src: atlas/assets/maps/map.jpg
        x: 0
        y: 0
        width: 200000
        height: 100000
        opacity: 1
        zIndex: 1

  - id: astrath-deeprealm-northern-reaches
    name: Northern Reaches
    width: 80000
    height: 60000
    oceanColor: "#1c2a35"
    wrapX: false
    layers: []

# Regions, routes, and fog were tied to the deleted placeholder entities
# (thornhold / sunhaven / ravens-vale / the-old-keep). Add new entries here
# when real content lands.
regions: []
routes: []
fog: []

calendar:
  name: Reckoning of the Twin Moons
  epochName: AS
  daysPerWeek: 8
  months:
    - { name: Frostmoon, days: 30 }
    - { name: Thawing,   days: 30 }
    - { name: Greentide, days: 32 }
    - { name: Highsun,   days: 32 }
    - { name: Goldfall,  days: 30 }
    - { name: Longnight, days: 30 }
